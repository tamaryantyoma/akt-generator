<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генерация акта приёма-передачи техники</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 36px 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 24px;
            color: #1a1a2e;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .section {
            background: #f8f9ff;
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 18px;
            border: 1px solid #e8eaff;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #302b63;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }

        .form-row:last-child { margin-bottom: 0; }

        .form-row label {
            font-size: 13px;
            font-weight: 500;
            color: #444;
            min-width: 130px;
            flex-shrink: 0;
        }

        .form-row input,
        .form-row select {
            flex: 1;
            padding: 10px 14px;
            border: 1.5px solid #dde0ee;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            background: white;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-row input:focus,
        .form-row select:focus {
            border-color: #6c63ff;
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
        }

        .form-row input.arm-input {
            font-family: 'Sylfaen', 'Segoe UI', 'Arial', sans-serif;
            font-size: 15px;
        }

        .radio-group {
            display: flex;
            gap: 18px;
            padding: 4px 0;
        }

        .radio-group label {
            min-width: auto;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #444;
        }

        .radio-group input[type="radio"] {
            flex: none;
            width: 16px;
            height: 16px;
            accent-color: #6c63ff;
            cursor: pointer;
        }

        .model-row {
            display: flex;
            gap: 8px;
        }

        .model-row select { flex: 1; }

        .model-row button {
            padding: 10px 14px;
            border: 1.5px solid #dde0ee;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            transition: all 0.2s;
            color: #6c63ff;
        }

        .model-row button:hover {
            background: #6c63ff;
            color: white;
            border-color: #6c63ff;
        }

        .date-display {
            padding: 10px 14px;
            border: 1.5px solid #dde0ee;
            border-radius: 10px;
            background: #f0f2ff;
            font-size: 14px;
            color: #555;
            flex: 1;
        }

        .generate-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #6c63ff, #4834d4);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 99, 255, 0.35);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Toast / уведомления */
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 14px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 999;
            max-width: 400px;
        }

        .toast.show { transform: translateX(0); }

        .toast.success { background: linear-gradient(135deg, #00b894, #00a381); }
        .toast.error { background: linear-gradient(135deg, #e17055, #d63031); }

        .toast-close {
            margin-left: 16px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        /* Подсказка */
        .hint {
            margin-top: 18px;
            padding: 14px 18px;
            background: #fff8e7;
            border-radius: 12px;
            border-left: 4px solid #f0a500;
            font-size: 12px;
            color: #776033;
            line-height: 1.6;
        }

        .hint strong { color: #5a4516; }

        /* Спиннер */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Адаптив */
        @media (max-width: 600px) {
            .container { padding: 20px 16px; }
            .form-row { flex-direction: column; align-items: stretch; }
            .form-row label { min-width: auto; font-size: 12px; }
            .section { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📄 Акт приёма-передачи</h1>
    <p class="subtitle">Генерация документа о выдаче техники сотруднику</p>

    <!-- Данные сотрудника -->
    <div class="section">
        <div class="section-title">👤 Данные сотрудника</div>

        <div class="form-row">
            <label>ФИО (армянский)</label>
            <input type="text" id="nameArm" class="arm-input"
                   placeholder="Անուն Հայրանուն Ազգանուն"
                   autocomplete="off">
        </div>

        <div class="form-row">
            <label>ФИО (русский)</label>
            <input type="text" id="nameRus"
                   placeholder="Фамилия Имя Отчество">
        </div>

        <div class="form-row">
            <label>Пол</label>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="Мужской" checked> Мужской</label>
                <label><input type="radio" name="gender" value="Женский"> Женский</label>
            </div>
        </div>

        <div class="form-row">
            <label>Гражданство</label>
            <div class="radio-group">
                <label><input type="radio" name="citizenship" value="РФ" checked> 🇷🇺 РФ</label>
                <label><input type="radio" name="citizenship" value="РА"> 🇦🇲 РА</label>
            </div>
        </div>
    </div>

    <!-- Данные ноутбука -->
    <div class="section">
        <div class="section-title">💻 Данные ноутбука</div>

        <div class="form-row">
            <label>Модель</label>
            <div class="model-row">
                <select id="modelSelect">
                    <option value="">— Выберите модель —</option>
                    {% for m in models %}
                    <option value="{{ m }}">{{ m }}</option>
                    {% endfor %}
                </select>
                <button id="addModelBtn" title="Добавить новую модель">➕</button>
            </div>
        </div>

        <div class="form-row">
            <label>Серийный номер</label>
            <input type="text" id="serial" placeholder="Например: PW0H2EGW">
        </div>

        <div class="form-row">
            <label>Дата выдачи</label>
            <div class="date-display" id="dateDisplay">{{ today_date }}</div>
        </div>
    </div>

    <!-- Кнопка -->
    <button class="generate-btn" id="generateBtn">
        📄 Сгенерировать акт
    </button>

    <!-- Подсказка -->
    <div class="hint">
        <strong>💡 Формат ввода:</strong><br>
        <strong>Армянский:</strong> Անուն Հայրանուն Ազգանուն — <em>например:</em> Լեոնիդ Ստանիսլավի Սիտրակով<br>
        <strong>Русский:</strong> Фамилия Имя Отчество — <em>например:</em> Ситраков Леонид Станиславович
    </div>
</div>

<!-- Toast-уведомление -->
<div class="toast" id="toast">
    <span id="toastMsg"></span>
    <button class="toast-close" onclick="hideToast()">✕</button>
</div>

<script>
    // ── Элементы ──
    const nameArm = document.getElementById('nameArm');
    const nameRus = document.getElementById('nameRus');
    const modelSelect = document.getElementById('modelSelect');
    const serial = document.getElementById('serial');
    const generateBtn = document.getElementById('generateBtn');
    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toastMsg');

    // ── Toast ──
    function showToast(msg, type = 'success') {
        toast.className = 'toast show ' + type;
        toastMsg.textContent = msg;
        setTimeout(hideToast, 6000);
    }

    function hideToast() {
        toast.className = 'toast';
    }

    // ── Добавить модель ──
    document.getElementById('addModelBtn').addEventListener('click', function() {
        const val = prompt('Введите название новой модели:');
        if (!val || !val.trim()) return;
        const model = val.trim();

        fetch('/api/models', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: model })
        })
        .then(r => r.json())
        .then(models => {
            // Обновляем select
            modelSelect.innerHTML = '<option value="">— Выберите модель —</option>';
            models.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                modelSelect.appendChild(opt);
            });
            modelSelect.value = model;
            showToast('✅ Модель «' + model + '» добавлена!');
        })
        .catch(() => showToast('❌ Ошибка при добавлении модели', 'error'));
    });

    // ── Генерация ──
    generateBtn.addEventListener('click', function() {
        const gender = document.querySelector('input[name="gender"]:checked').value;
        const citizenship = document.querySelector('input[name="citizenship"]:checked').value;

        // Проверка
        if (!nameArm.value.trim()) {
            showToast('❌ Введите ФИО на армянском', 'error');
            nameArm.focus();
            return;
        }
        if (nameArm.value.trim().split(/\s+/).length < 3) {
            showToast('❌ Армянское ФИО: нужно 3 части (Անուն Հայրանուն Ազգանուն)', 'error');
            nameArm.focus();
            return;
        }
        if (!nameRus.value.trim()) {
            showToast('❌ Введите ФИО на русском', 'error');
            nameRus.focus();
            return;
        }
        if (nameRus.value.trim().split(/\s+/).length < 3) {
            showToast('❌ Русское ФИО: нужно 3 части (Фамилия Имя Отчество)', 'error');
            nameRus.focus();
            return;
        }
        if (!modelSelect.value) {
            showToast('❌ Выберите модель ноутбука', 'error');
            modelSelect.focus();
            return;
        }
        if (!serial.value.trim()) {
            showToast('❌ Введите серийный номер', 'error');
            serial.focus();
            return;
        }

        // Блокируем кнопку
        generateBtn.disabled = true;
        generateBtn.innerHTML = '<span class="spinner"></span> Генерация...';

        fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name_arm: nameArm.value.trim(),
                name_rus: nameRus.value.trim(),
                gender: gender,
                citizenship: citizenship,
                model: modelSelect.value,
                serial: serial.value.trim()
            })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                showToast('✅ Акт сохранён: ' + data.filename);

                // Пробуем скачать
                const a = document.createElement('a');
                const downloadUrl = '/api/download/' + data.folder + '/' + encodeURIComponent(data.filename);
                a.href = downloadUrl;
                a.download = data.filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } else {
                const msgs = data.errors ? data.errors.join('; ') : 'Неизвестная ошибка';
                showToast('❌ ' + msgs, 'error');
            }
        })
        .catch(err => {
            showToast('❌ Ошибка соединения: ' + err, 'error');
        })
        .finally(() => {
            generateBtn.disabled = false;
            generateBtn.innerHTML = '📄 Сгенерировать акт';
        });
    });

    // Enter в полях
    nameArm.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') nameRus.focus();
    });
    nameRus.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') serial.focus();
    });
    serial.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') generateBtn.click();
    });
</script>

</body>
</html>
